<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalie seu pedido — Doces Flor</title>

<!-- Open Graph / WhatsApp -->
<meta property="og:title" content="Avalie seu pedido — Doces Flor">
<meta property="og:description" content="Sua opinião é muito importante para nós! Deixe sua avaliação sobre os brigadeiros Doces Flor 🌸">
<meta property="og:image" content="https://docesflor.github.io/shared/icone.png">
<meta property="og:type" content="website">
<meta property="og:locale" content="pt_BR">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://docesflor.github.io/shared/theme.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://docesflor.github.io/shared/firebase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.3/confetti.browser.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   AVALIAÇÃO — ESTILOS ESPECÍFICOS
   Reset, :root (cores) e fontes-base já vêm de shared/theme.css
   (carregado acima). Aqui só o que é próprio desta página.
═══════════════════════════════════════════ */

body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    background: var(--brown-dark);
    color: var(--text-body);
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,148,58,0.18) 0%, transparent 70%),
        repeating-linear-gradient(-45deg, transparent 0px, transparent 18px, rgba(255,255,255,0.02) 18px, rgba(255,255,255,0.02) 19px);
    pointer-events: none;
}

.box {
    position: relative;
    z-index: 1;
    background: var(--cream);
    border-radius: 24px;
    padding: 40px 32px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    text-align: center;
}

/* Versão estática do anel de logo (sem flutuar) — a página de avaliação
   é rápida/objetiva, então mantive sem animação, diferente do
   .logo-ring-anim usado em pedidos/cardápio. */
.logo-ring {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 3px solid var(--amber);
    padding: 4px;
    background: var(--brown-dark);
    box-shadow: 0 0 0 1px rgba(232,148,58,0.3), 0 12px 30px rgba(0,0,0,0.4);
    margin: 0 auto 18px;
}
.logo-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--brown-dark);
    margin-bottom: 4px;
}

#nomeCliente {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--brown-warm);
    font-size: 1rem;
    margin-bottom: 22px;
}

.carinhas { display: flex; justify-content: center; gap: 18px; font-size: 3em; margin: 12px 0 24px; cursor: pointer; user-select: none; }
.carinha { opacity: 0.25; transition: opacity 0.2s, transform 0.15s; display: inline-block; }
.carinha.ativa { opacity: 1; animation: carinhaBounce 0.45s cubic-bezier(.34,1.56,.64,1); }
.carinha:active { transform: scale(0.9); }
.carinha:hover { opacity: 0.6; transform: scale(1.1); }
@keyframes carinhaBounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.35) rotate(-8deg); }
    70%  { transform: scale(1.05) rotate(4deg); }
    100% { transform: scale(1.15) rotate(0deg); }
}
#caixaPrincipal { animation: caixaEntrar 0.35s ease; }
@keyframes caixaEntrar {
    0%   { opacity: 0; transform: scale(0.94) translateY(12px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
#avaliacoesResumo {
    font-size: 0.78rem; color: var(--brown-warm); opacity: 0.75;
    margin-bottom: 14px; margin-top: -8px;
}

textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 16px;
    border: 2px solid var(--cream-dark);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--brown-dark);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}
textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(232,148,58,0.15); }
textarea::placeholder { color: var(--brown-warm); opacity: 0.6; }

button.enviar {
    width: 100%;
    background: var(--amber);
    color: var(--white);
    border: none;
    padding: 15px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.96rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
}
button.enviar:hover { background: #C9522A; transform: translateY(-1px); }
button.enviar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.sucesso-icon { font-size: 3rem; margin-bottom: 10px; }
.sucesso-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--brown-dark);
    margin-bottom: 8px;
}
.sucesso-texto { color: var(--brown-warm); font-size: 0.92rem; line-height: 1.5; }

.rodape {
    margin-top: 22px;
    font-size: 0.74rem;
    color: var(--brown-warm);
    opacity: 0.7;
    letter-spacing: 0.04em;
}

.btn-google {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    border-radius: 50px;
    background: var(--white);
    border: 2px solid var(--amber);
    color: var(--brown-dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
}
.btn-google:hover { background: var(--cream-dark); transform: translateY(-1px); }

.btn-google.destaque {
    padding: 18px;
    font-size: 1.05rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--amber), #ffb347);
    color: var(--white);
    border: none;
    box-shadow: 0 10px 28px rgba(232,148,58,0.5);
    animation: btnGoogleChama 2.6s ease-in-out infinite;
}
.btn-google.destaque:hover {
    background: linear-gradient(135deg, var(--amber), #ffb347);
    transform: translateY(-2px) scale(1.03);
}
@keyframes btnGoogleChama {
    0%, 55%, 100% { transform: scale(1) rotate(0deg); box-shadow: 0 10px 28px rgba(232,148,58,0.5); }
    5%  { transform: scale(1.07) rotate(-3deg); }
    10% { transform: scale(1.04) rotate(3deg); }
    15% { transform: scale(1.07) rotate(-2deg); }
    20% { transform: scale(1) rotate(0deg); box-shadow: 0 16px 36px rgba(232,148,58,0.7); }
}

.google-skip {
    margin-top: 12px;
    font-size: 0.78rem;
    color: var(--brown-warm);
    opacity: 0.6;
    cursor: pointer;
    text-decoration: underline;
}
.google-skip:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="box" id="caixaPrincipal">
  <div class="logo-ring"><img src="https://docesflor.github.io/shared/icone.png" alt="Doces Flor"></div>
    <h2>Como foi seu pedido? 🌸</h2>
    <p id="nomeCliente"></p>
    <p id="avaliacoesResumo"></p>
    <div class="carinhas" id="carinhas">
        <span class="carinha" data-v="1">😞</span>
        <span class="carinha" data-v="2">😐</span>
        <span class="carinha" data-v="3">😊</span>
    </div>
    <textarea id="comentario" placeholder="Quer deixar um comentário? (opcional)"></textarea>
    <button class="enviar" id="btnEnviar" onclick="enviarAvaliacao()">Enviar Avaliação</button>
    <p class="rodape">Doces Flor · Feito com amor, entregue com carinho ♥</p>
</div>

<script>
const LINK_AVALIACAO_GOOGLE = 'https://g.page/r/CVJlWyAx7g0hEBI/review';

firebase.initializeApp(window.FIREBASE_CONFIG);
const database = firebase.database();

const params = new URLSearchParams(window.location.search);
const pedidoKey = params.get('pedido');
let notaSelecionada = 0;
let primeiroNomeCliente = 'Cliente';

// Mostra quantas avaliações já foram feitas no total (não tem quebra por dia salva hoje)
database.ref('estatisticas-avaliacoes').once('value').then(snap => {
    const dados = snap.val() || {};
    const total = (dados.nota1||0) + (dados.nota2||0) + (dados.nota3||0);
    if (total > 0) {
        document.getElementById('avaliacoesResumo').textContent =
            `🌸 Já são ${total} avaliações de clientes como você!`;
    }
}).catch(() => {});

if (pedidoKey) {
    database.ref('pedidos/' + pedidoKey + '/nome').once('value')
        .then(snap => {
            const nome = snap.val();
            if (nome) {
                document.getElementById('nomeCliente').textContent = 'Olá, ' + nome + '!';
                primeiroNomeCliente = nome.trim().split(' ')[0] || 'Cliente';
            }
        })
        .catch(() => { /* sem permissão pública — segue sem mostrar o nome */ });
}

document.querySelectorAll('.carinha').forEach(el => {
    el.addEventListener('click', function() {
        notaSelecionada = parseInt(this.dataset.v);
        document.querySelectorAll('.carinha').forEach(e => {
            e.classList.toggle('ativa', e === this);
        });
    });
});

function enviarAvaliacao() {
    if (notaSelecionada === 0) { alert('Toque em uma das opções para avaliar.'); return; }
    if (!pedidoKey) { alert('Link inválido.'); return; }

    const comentario = document.getElementById('comentario').value.trim();
    const btn = document.getElementById('btnEnviar');
    btn.textContent = 'Enviando...';
    btn.disabled = true;

    // 1. Atualiza o pedido
    database.ref('pedidos/' + pedidoKey).update({
        avaliacao: { nota: notaSelecionada, comentario, timestamp: Date.now() },
        avaliacaoRespondida: true
    })
    .then(() => {
        // 2. Se for nota 3 com comentário, salva depoimento público
        if (notaSelecionada === 3 && comentario !== '') {
            return database.ref('depoimentos-publicos').push({
                nome: primeiroNomeCliente,
                comentario,
                nota: 3,
                timestamp: Date.now()
            });
        }
        return Promise.resolve(); // ← AQUI! Retorna uma Promise resolvida
    })
    .then(() => {
        // 3. Incrementa contador de avaliações
        return database.ref('estatisticas-avaliacoes/nota' + notaSelecionada).transaction(atual => (atual || 0) + 1);
    })
    .then(() => {
        // 4. Mostra a tela de sucesso
        mostrarTelaSucesso(comentario);
    })
    .catch(err => {
        console.error(err);
        alert('Não foi possível enviar sua avaliação. Tente novamente em instantes.');
        btn.textContent = 'Enviar Avaliação';
        btn.disabled = false;
    });
}

function mostrarTelaSucesso() {
    const caixa = document.getElementById('caixaPrincipal');
    if (notaSelecionada === 1) {
        // Nota baixa: prioriza resolver o problema em vez de pedir avaliação no Google
        const numeroWhats = '5547992745896';
        const msgWhats = encodeURIComponent(`Olá! Sou ${primeiroNomeCliente} e gostaria de falar sobre meu último pedido.`);
        caixa.innerHTML = `
            <div class="sucesso-icon">🙏</div>
            <div class="sucesso-titulo">Sentimos muito!</div>
            <p class="sucesso-texto">Sua opinião chegou até nós e queremos resolver isso.<br>Fale com a gente agora mesmo:</p>
            <a class="btn-google" style="display:block;text-decoration:none;box-sizing:border-box;" href="https://wa.me/${numeroWhats}?text=${msgWhats}" target="_blank" rel="noopener">💬 Falar no WhatsApp</a>
            <p class="google-skip" onclick="document.querySelector('.btn-google').parentElement.querySelectorAll('.btn-google,.google-skip').forEach(e=>e.style.display='none')">Agora não, obrigado</p>`;
    } else {
        if (notaSelecionada === 3 && typeof confetti === 'function') {
            confetti({ particleCount: 90, spread: 70, origin: { y: 0.6 } });
        }
        caixa.innerHTML = `
            <div class="sucesso-icon">💛</div>
            <div class="sucesso-titulo">Obrigada!</div>
            <p class="sucesso-texto">Sua avaliação foi enviada com sucesso.<br>Esperamos te ver novamente em breve! 🌸</p>
            <button class="btn-google destaque" onclick="irParaGoogle()">⭐ Avaliar também no Google</button>
            <p class="google-skip" id="googleSkip" onclick="fecharConvite()">Agora não, obrigado</p>`;
    }
    caixa.style.animation = 'none';
    void caixa.offsetWidth; // força reflow pra reiniciar a animação
    caixa.style.animation = 'caixaEntrar 0.4s ease';
}

function irParaGoogle() {
    if (pedidoKey) {
        database.ref('pedidos/' + pedidoKey).update({
            cliqueAvaliacaoGoogle: Date.now()
        }).catch(err => console.error('Erro ao registrar clique:', err));
    }
    window.open(LINK_AVALIACAO_GOOGLE, '_blank', 'noopener');
    fecharConvite();
}

function fecharConvite() {
    const btn = document.querySelector('.btn-google');
    const skip = document.getElementById('googleSkip');
    if (btn) btn.style.display = 'none';
    if (skip) skip.style.display = 'none';
}
</script>
</body>
</html>
